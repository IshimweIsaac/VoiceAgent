<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VoiceAgent — Register</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>VoiceAgent</h1>
      <p class="subtitle">Create your business account</p>

      {% for msg in messages %}
      <div class="alert alert-{{ msg.type }}">{{ msg.text }}</div>
      {% endfor %}

      <form method="POST" action="/register">
        <div class="form-group">
          <label for="business_name">Business Name</label>
          <input type="text" id="business_name" name="business_name" 
                 placeholder="Joe's Plumbing" required autofocus>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" 
                 placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="phone_number">Phone Number</label>
          <input type="tel" id="phone_number" name="phone_number" 
                 placeholder="+12025551234" required>
          <div class="help-text">Your Twilio phone number in E.164 format</div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" 
                 placeholder="At least 8 characters" required minlength="8">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
            Create Account
          </button>
        </div>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>
  </div>
</body>
</html>
